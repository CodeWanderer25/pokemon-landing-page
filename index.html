  <body>
    <div class="outer">
      <div class="inner">
        <div class="top-image">
          <img class="menu" src="./assests/menu.png" alt="Menu" />

            class="pokemon-logo"

            alt="pokemon"

        </div>

                    <img src="./assests/leaf.png" alt="" class="leaf">
                    <img src="./assests/meowscarada.avif" alt="" class="meow" style="border-radius: 15px;">

                <p style="font-size: 24px; margin: 10px 0 0 20px;">Meowscarada</p>
